version: 2


steps: &steps
  steps:
#    - restore_cache:
#        keys:
#          - cache-{{ .Environment.CIRCLE_JOB }}
    - run:
        name: Configure R to use C++14
        command: |
          mkdir -p ~/.R
          # Force C++14 even when C++11 is requested (required for modern RcppArmadillo)
          echo "CXX11=g++" >> ~/.R/Makevars
          echo "CXX11STD=-std=gnu++14" >> ~/.R/Makevars
          echo "CXX11FLAGS=-O3 -fPIC" >> ~/.R/Makevars
          echo "CXX14=g++" >> ~/.R/Makevars
          echo "CXX14STD=-std=gnu++14" >> ~/.R/Makevars
          echo "CXX14FLAGS=-O3 -fPIC" >> ~/.R/Makevars
    - checkout
    - run:
        name: manual installs
        command: R -e "install.packages(c('clue', 'FRESA.CAD', 'cardx', 'DEoptimR', 'statsExpressions', 'checkmate'))"
    - run:
        name: Install dependencies
        command: |
          R -e "if (!requireNamespace('pak', quietly = TRUE)) install.packages('pak')"
          R -e "pak::local_install_deps()"
    - run:
        no_output_timeout: 30m
        name: Build package
        command: R CMD build .
    - run:
        no_output_timeout: 30m
        name: Check package
        command: R CMD check --no-manual *tar.gz
#    - store_artifacts:
#        path: ci4rB.Rcheck/
#    - save_cache:
#        key: cache-{{ .Environment.CIRCLE_JOB }}
#        paths:
#          - "/usr/local/lib/R/site-libraryX"

jobs:
  release:
    docker:
      - image: rocker/verse:latest
    <<: *steps
  oldrel:
    docker:
      - image: rocker/verse:4.2
    <<: *steps
  devel:
    docker:
      - image: rocker/verse:devel
    <<: *steps

workflows:
  version: 2
  all:
    jobs:
      - release
#      - oldrel
#      - devel
